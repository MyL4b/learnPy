<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Typing Python code</title>

  <!-- Pyodide -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

  <!-- Monaco Editor -->
  <script src="https://unpkg.com/monaco-editor@0.43.0/min/vs/loader.js"></script>

  <style>
    body {
      background: #d3d3d3;
      font-family: "Times New Roman", serif;
      display: flex;
      justify-content: center;
      background-position: center;
      padding: 0;
	  margin: 0;
    }

    .page {
      background: white;
      display: flex;
      flex-direction: column;
      padding: 10mm;
      width: max-content;
      min-height: max-content;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      color: #111;
      line-height: 1.6;
      text-align: justify;
      position: relative;
	  border-radius: 30px;
    }
	
	/* Page title */
	.title {
		color: #003366;
		font-size: clamp(24px, 3vw, 32px);
		font-weight: 700;
		text-align: left;
		margin-bottom: 0px;
		margin-top: 0px ;
	}
	
	/* Line divider under title */
	.divider {
		width: 100%;
		height: 4px;
		margin: 0 0 0 0;
		border: none;
		background: linear-gradient(to right, #555 0%, #999 30%, transparent 100%);
	}

    button {
      display: block;
      margin: 10px 10px 0px;
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 14pt;
      border-radius: 6px;
      cursor: pointer;
	  font-weight: 600;
	  box-shadow: 0 3px 10px rgba(0,0,0,0.5);
	  transition: transform 0.4s ease, background 0.4s ease;
		
    }

    button:hover {
      background: linear-gradient(135deg, #0056b3, #1f75cc);
    }

    /* Editor and output styling */
    #editor {
      width: 620px;
      height: 300px;
      border: 5px solid #ADD8E6;
      margin-top: 15px;
	  color: white; 
	  background-color: #1e1e1e;  /* dark background for code editor */
	  mix-blend-mode: difference; /* auto adjust against page background */
	  border-radius: 10px;
    }

    #output {
      width: 600px;
      height: 300px;
	  border: 5px solid #ADD8E6;
      color: white; 
      font-family: monospace;
      padding: 10px;
      margin-top: 10px;
      overflow-y: auto;
      white-space: pre-wrap;
	  background-color: #1e1e1e;  /* dark background for code editor */
	  mix-blend-mode: difference; /* auto adjust against page background */
	  border-radius: 10px;
    }
  </style>
</head>
<body>

  <div class="page">
	<div class="header">
		<h1 class="title">Integrated Development Environment</h1>
		<hr class="divider">
	</div>
    
    
    <!-- Monaco Editor -->
    <div id="editor"></div>

	<button onclick="runPython()"> Run Code</button>

    <!-- Output console -->
    <div id="output">Loading Pyodide...</div>

  </div>

  <script>
    // Load Pyodide
    let pyodide = null;
    let pyodideReady = false;

    async function loadPyodideAndPackages() {
      pyodide = await loadPyodide();
      pyodideReady = true;
      document.getElementById('output').textContent = "✅ Pyodide loaded. You can run Python code now.";
    }
    loadPyodideAndPackages();

    // Initialize Monaco Editor
    require.config({ paths: { 'vs': 'https://unpkg.com/monaco-editor@0.43.0/min/vs' }});
    require(['vs/editor/editor.main'], function () {
      window.editor = monaco.editor.create(document.getElementById('editor'), {
        value: `print("Hello World")\nfor i in range(3):\n    print("Count:", i)`,
        language: 'python',
        theme: 'vs-dark',
        fontSize: 14,
      });
    });

    // Run Python code
    async function runPython() {
      const outputDiv = document.getElementById('output');
      if (!pyodideReady) {
        outputDiv.textContent = "⏳ Pyodide is still loading...";
        return;
      }

      const code = window.editor.getValue();
      outputDiv.textContent = "";

      try {
        const safeCode = code.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$/g, '\\$');

        await pyodide.runPythonAsync(`
import sys, io, traceback
from contextlib import redirect_stdout, redirect_stderr

_stdout, _stderr = io.StringIO(), io.StringIO()
with redirect_stdout(_stdout), redirect_stderr(_stderr):
    try:
        exec("""${safeCode}""")
    except Exception:
        traceback.print_exc()
output = _stdout.getvalue() + _stderr.getvalue()
        `);

        const output = pyodide.globals.get("output");
        outputDiv.textContent = output || "[No output]";
      } catch (err) {
        outputDiv.textContent = "❌ Error:\n" + err;
      }
    }
  </script>

</body>
</html>
