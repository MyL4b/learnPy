<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Learning Python</title>



  <style>
    body {
      background: #d3d3d3;
      font-family: "Times New Roman", serif;
      display: flex;
      justify-content: center;
      background-position: center;
      padding: 0;
	  margin: 0;
    }

    .page {
      background: white;
      display: flex;
      flex-direction: column;
      padding: 10mm;
      width: max-content;
      min-height: max-content;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      color: #111;
      line-height: 1.6;
      border-radius: 30px;  
      position: relative;
    }
	
	/* Page title */
	.title {
		color: #003366;
		font-size: clamp(24px, 3vw, 32px);
		font-weight: 700;
		text-align: left;
		margin-bottom: 1px;
		margin-top: 0px ;
	}
	
	/* Line divider under title */
	.divider {
		width: 100%;
		height: 4px;
		margin: 0 0 15px 0;
		border: none;
		background: linear-gradient(to right, #555 0%, #999 30%, transparent 100%);
	}

    button {
      display: block;
      margin: 10px 10px 0px;
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 14pt;
      border-radius: 6px;
      cursor: pointer;
	  font-weight: 600;
	  box-shadow: 0 3px 10px rgba(0,0,0,0.5);
	  transition: transform 0.4s ease, background 0.4s ease;
    }

    button:hover {
	  background: linear-gradient(135deg, #0056b3, #1f75cc);
	 
    }

	.slideshow-container {
	  position: relative;
	  display: flex;
	  justify-content: center;
	  align-items: center;

	  width: 100%;          /* Take full width of parent */
	  max-width: 100%;      /* Prevent overflow */
	  height: auto;         /* Allow height to adjust */
	  
	}

	.slideshow-container img {
	  width: 100%;           /* Make image fill the container width */
	  height: auto;          /* Maintain aspect ratio */
	  max-width: 100%;       /* Prevent image from stretching too wide */
	  border-radius: 10px;
	  object-fit: cover;     /* Optional: control how image fits if dimensions are constrained */
	}

    /* Edge arrows */
    .nav-btn {
      all: unset;  
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: white;
      mix-blend-mode: difference;
      padding: 20px 20px;
      font-size: 40px;
      cursor: pointer;
      user-select: none;
    }

    .nav-btn:hover {
      color: #0000FF;
      background: none;
    }

    .left { left: -50px; }
    .right { right: -50px; }


  </style>
</head>
<body>

  <div class="page">
	<div class="header">
		<h1 class="title">An introduction to Python</h1>
		<hr class="divider">
	</div>
	
	
    <div class="slideshow-container">
      <img id="slide" src="1.png" alt="Page 1">
      <button class="nav-btn left" onclick="prevSlide()">&#10094;</button>
      <button class="nav-btn right" onclick="nextSlide()">&#10095;</button>
    </div>

    <button onclick="window.open('IDE.htm', '_blank')">Open Editor</button>

  </div>



  <script>
    // Slideshow
    const images = ['1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg'];
    let currentSlide = 0;
    const slide = document.getElementById('slide');
    function showSlide(index) { slide.src = images[index]; }
    function nextSlide() { currentSlide = (currentSlide + 1) % images.length; showSlide(currentSlide); }
    function prevSlide() { currentSlide = (currentSlide - 1 + images.length) % images.length; showSlide(currentSlide); }
    showSlide(currentSlide);


  </script>
</body>
</html>
