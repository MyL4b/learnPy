<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Python</title>

  <style>
    /* General page styles */
    body {
      background: #d3d3d3;
      font-family: "Times New Roman", serif;
      display: flex;
      justify-content: center;
      background-position: center;
      padding: 0;
      margin: 0;
    }

    /* Main content container */
    .page {
      background: white;
      display: flex;
      flex-direction: column;
      padding: 10mm;
      width: max-content;
      min-height: max-content;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      color: #111;
      line-height: 1.6;
      border-radius: 30px;
      position: relative;
      margin: 20px 0;
    }

    /* Title styling */
    .title {
      color: #003366;
      font-size: clamp(24px, 3vw, 32px);
      font-weight: 700;
      text-align: left;
      margin-bottom: 1px;
      margin-top: 0px;
    }

    /* Divider styling */
    .divider {
      width: 100%;
      height: 4px;
      margin: 0 0 15px 0;
      border: none;
      background: linear-gradient(to right, #555 0%, #999 30%, transparent 100%);
    }

    /* Button styling */
    button, .btn-link {
      display: block;
      margin: 10px 10px 0px;
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 14pt;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 3px 10px rgba(0,0,0,0.5);
      transition: transform 0.4s ease, background 0.4s ease;
      text-decoration: none;
      text-align: center;
    }

    button:hover, .btn-link:hover {
      background: linear-gradient(135deg, #0056b3, #1f75cc);
    }

    /* PDF container (same idea as slideshow container) */
    .pdf-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 100%;
      height: auto;
    }

    /* PDF viewer */
    .pdf-viewer {
      width: 80vh;
      height: 100vh;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
      overflow: hidden;
	  
	  
    }

    /* Make sure embed/iframe fills the viewer */
    .pdf-viewer iframe,
    .pdf-viewer embed {
      width: 100%;
      height: 100%;
      border: none;
    }


  </style>
</head>

<body>
  <div class="page">
    <div class="header">
      <h1 class="title">An introduction to Python</h1>
      <hr class="divider">
    </div>

    <!-- PDF viewer -->
    <div class="pdf-container">
      <div class="pdf-viewer">
        <!-- Change mybook.pdf to your PDF filename -->
        <iframe src="OLD Python.pdf"></iframe>
        <!-- Alternative:
        <embed src="OLD Python.pdf" type="application/pdf">
        -->
      </div>
    </div>

    <!-- Buttons (same style as yours) -->
    <button onclick="window.open('IDE.htm', '_blank')">Open Editor</button>
  </div>
</body>
</html>
